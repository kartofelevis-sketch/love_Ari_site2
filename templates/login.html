<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<title>Только для тебя ❤️</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

.login-box{
    width:400px;
    padding:40px;
    border-radius:25px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
}

input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:14px;
    margin-top:20px;
    font-size:16px;
    background:rgba(255,255,255,0.1);
    color:white;
}

button{
    width:100%;
    margin-top:20px;
    padding:15px;
    border:none;
    border-radius:14px;
    background:#ff4d8d;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

.error{
    margin-top:15px;
    color:#ff9dbf;
}

</style>

</head>
<body>

<section class="hero">

<div class="login-box">

<h1>❤️</h1>

<p>
Пароль: дата рождения лучшего человека
    отгадаешь?
</p>

<form method="POST">

<input
type="password"
name="password"
placeholder="Введите пароль"
/>

<button type="submit">
Войти
</button>

</form>

{% if error %}
<div class="error">
    {{ error }}
</div>
{% endif %}

</div>

</section>

</body>
</html>
